<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOGIFAB | HORIZON v7.5</title>
    <style>
        :root { --neon: #ffffff; --bg: #000000; --pass: #00ff66; --gain: 20; }
        * { box-sizing: border-box; touch-action: none; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--neon); font-family: 'Inter', system-ui, sans-serif; height: 100vh; overflow: hidden; }

        /* FULL-BLEED CHAMBER */
        #vault-chamber {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            perspective: 1000px;
        }

        /* THE SOUL (BACKGROUND FEED) */
        video#bg-feed {
            position: absolute; width: 120%; height: 120%;
            object-fit: cover; filter: blur(60px) brightness(0.2) grayscale(1);
            opacity: 0; transition: opacity 2s ease; z-index: 1;
        }

        /* THE REFRACTIVE CORE (THE KEY) */
        #core-ring {
            width: 80vw; height: 80vw; max-width: 380px; max-height: 380px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%; z-index: 10;
            overflow: hidden; backdrop-filter: blur(20px);
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            transform: scale(0.8); opacity: 0.1;
            transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1), opacity 1s ease;
        }

        video#live-feed {
            width: 160%; height: 160%; object-fit: cover;
            filter: grayscale(1) contrast(1.5) brightness(0.6);
            mix-blend-mode: screen; position: relative;
        }

        /* THE HUD (ZERO-FLUFF) */
        #hud {
            position: absolute; bottom: 8%; width: 100%;
            text-align: center; z-index: 20; opacity: 0;
            transition: opacity 1s ease;
        }
        .directive { font-size: 12px; letter-spacing: 10px; font-weight: 200; text-transform: uppercase; margin-bottom: 10px; }
        .r-metric { font-family: monospace; font-size: 10px; opacity: 0.4; }

        /* STATES */
        .active-core { transform: scale(1) !important; opacity: 1 !important; border-color: rgba(255,255,255,0.4) !important; }
        .active-ui { opacity: 1 !important; }
    </style>
</head>
<body>

<div id="vault-chamber">
    <video id="bg-feed" autoplay playsinline muted></video>
    
    <div id="core-ring">
        <video id="live-feed" autoplay playsinline muted></video>
    </div>

    <div id="hud">
        <div class="directive" id="msg">LIFT TO WAKE</div>
        <div class="r-metric">COHERENCE: <span id="r-val">0.000</span></div>
    </div>
</div>

<script>
const bg = document.getElementById('bg-feed'), live = document.getElementById('live-feed');
const core = document.getElementById('core-ring'), hud = document.getElementById('hud');
const msg = document.getElementById('msg'), rVal = document.getElementById('r-val');

let isAwake = false, historyX = [], historyF = [], prevFrame = null;
const canvas = document.createElement('canvas'); 
const ctx = canvas.getContext('2d', {willReadFrequently: true});
canvas.width = 60; canvas.height = 60;

// LIFT-TO-WAKE & PERMISSION INITIALIZER
document.body.addEventListener('click', async () => {
    if (isAwake) return;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
        bg.srcObject = live.srcObject = stream;
        if(typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
        
        isAwake = true;
        bg.style.opacity = "0.6";
        core.classList.add('active-core');
        hud.classList.add('active-ui');
        msg.textContent = "STABILIZING...";
        
        window.addEventListener('devicemotion', handleMotion);
        requestAnimationFrame(loop);
    } catch(e) { msg.textContent = "HARDWARE ERROR"; }
});

function handleMotion(e) {
    const x = e.accelerationIncludingGravity.x || 0;
    const y = e.accelerationIncludingGravity.y || 0;
    const z = e.accelerationIncludingGravity.z || 0;

    // GAIN-AMPLIFIED PARALLAX (THE "SLOSH")
    const g = 15; // High Gain
    const moveX = x * g; const moveY = y * -g;
    
    // Core reacts with weight
    core.style.transform = `translate(${x * 2}px, ${y * -2}px) rotateY(${x * 3}deg) rotateX(${y * -3}deg)`;
    // Video sloshes inside
    live.style.transform = `translate(${moveX - 30}% , ${moveY - 30}%) scale(1.5)`;
    // Background drifts opposite
    bg.style.transform = `translate(${x * -10}px, ${y * 10}px) scale(1.1)`;

    historyX.push(x); if(historyX.length > 40) historyX.shift();
}

function calculateCorrelation(a, b) {
    if(a.length < 5) return 0;
    const n = a.length;
    const m1 = a.reduce((p,c)=>p+c,0)/n, m2 = b.reduce((p,c)=>p+c,0)/n;
    let num = 0, d1 = 0, d2 = 0;
    for(let i=0; i<n; i++){
        const v1 = a[i]-m1, v2 = b[i]-m2;
        num += v1*v2; d1 += v1*v1; d2 += v2*v2;
    }
    return num / Math.sqrt(d1 * d2 || 1);
}

function loop() {
    if (live.readyState >= 2) {
        ctx.drawImage(live, 0, 0, 60, 60);
        const frame = ctx.getImageData(0,0,60,60).data;
        if (prevFrame) {
            let flow = 0;
            for (let i = 0; i < frame.length; i += 16) flow += (frame[i] - prevFrame[i]);
            historyF.push(flow); if(historyF.length > 40) historyF.shift();
            
            const r = Math.abs(calculateCorrelation(historyX, historyF));
            rVal.textContent = r.toFixed(3);
            
            if (r > 0.8) {
                msg.textContent = "KINETIC MATCH";
                msg.style.color = "var(--pass)";
            } else if (isAwake) {
                msg.textContent = "ALIGN VECTOR";
                msg.style.color = "var(--neon)";
            }
        }
        prevFrame = frame.slice();
    }
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
