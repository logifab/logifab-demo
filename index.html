<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #000; margin: 0; overflow: hidden; touch-action: none; }
        canvas { display: block; filter: contrast(1.8) blur(1px) brightness(1.2); }
        #overlay { position: fixed; top: 40px; width: 100%; text-align: center; color: #fff; letter-spacing: 10px; font-size: 9px; opacity: 0.2; font-family: monospace; }
    </style>
</head>
<body>
    <div id="overlay">NEURAL_RESONANCE_v11.6</div>
    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
let w, h, ripples = [], isLive = false, coherenceCount = 0;

window.onresize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
window.onresize();

document.body.onclick = async () => {
    if (typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
    isLive = true;
    window.addEventListener('devicemotion', e => {
        const x = e.acceleration.x || 0;
        const y = e.acceleration.y || 0;
        const force = Math.sqrt(x*x + y*y);
        
        // 8-12Hz Filter Simulation: Create ripples only on human-jitter delta
        if (force > 0.08 && force < 0.3) {
            ripples.push({ x: w/2, y: h/2, r: 0, a: 0.8, v: force * 8, color: '255, 255, 255' });
            coherenceCount++;
            
            // THE MECHANICAL CLICK: Tactile confirmation of the shadow
            if (coherenceCount % 5 === 0 && navigator.vibrate) navigator.vibrate(10);
        }
    });
    draw();
};

function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.2)'; // Persistent trails
    ctx.fillRect(0, 0, w, h);
    
    // THE HARMONIC CONVERGENCE: Color shift as proof of life increases
    let color = '255, 255, 255';
    if (coherenceCount > 50) color = '100, 180, 255'; // The "Obsidian Blue" shift
    if (coherenceCount > 100) success();

    ripples.forEach((p, i) => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${color}, ${p.a})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        
        p.r += p.v; 
        p.a -= 0.015;
        if (p.a <= 0) ripples.splice(i, 1);
    });

    if (isLive) requestAnimationFrame(draw);
}

function success() {
    isLive = false;
    ctx.fillStyle = "#fff";
    ctx.fillRect(0,0,w,h);
    if (navigator.vibrate) navigator.vibrate([30, 100]);
    setTimeout(() => {
        document.body.innerHTML = "<div style='color:#fff; font-family:monospace; text-align:center; margin-top:45vh; letter-spacing:5px;'>ATTESTATION_COMPLETE<br>GHOST_KEY_GENERATED</div>";
    }, 150);
}
</script>
</body>
</html>
