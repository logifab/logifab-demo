<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOGIFAB | GHOST v12.1</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; touch-action: none; font-family: monospace; }
        canvas { display: block; filter: contrast(1.5) brightness(1.2); }
        #status { position: fixed; top: 20px; width: 100%; text-align: center; color: #fff; font-size: 9px; letter-spacing: 4px; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>
    <div id="status">KINETIC_SHADOW_ACTIVE // TAP_TO_INIT</div>
    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
let w, h, ripples = [], isVerified = false, samples = 0, jitterAccum = 0;
let historyZ = [];

window.onresize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
window.onresize();

document.body.onclick = async () => {
    if (typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
    document.getElementById('status').textContent = "MONITORING_NEURAL_STOCHASTICITY";
    window.addEventListener('devicemotion', handleMotion);
    draw();
};

function handleMotion(e) {
    const x = e.acceleration.x || 0;
    const y = e.acceleration.y || 0;
    const z = e.acceleration.z || 0;
    const force = Math.sqrt(x*x + y*y);

    historyZ.push(z); if(historyZ.length > 60) historyZ.shift();

    // 8-12Hz HUMAN FILTER: Detecting the shadow
    if (force > 0.04 && force < 0.25) {
        jitterAccum += force;
        samples++;
        // Create the "Boomerang" Ripple
        ripples.push({
            x: w/2, y: h/2, r: 0, a: 0.6, 
            v: force * 15, 
            vx: (Math.random() - 0.5) * 2, // Random drift
            vy: (Math.random() - 0.5) * 2,
            bounced: false
        });
    }

    if (samples > 80 && !isVerified) {
        const avg = jitterAccum / samples;
        if (avg > 0.015) triggerSuccess();
        samples = 0; jitterAccum = 0;
    }
}

function triggerSuccess() {
    isVerified = true;
    document.getElementById('status').textContent = "ATTESTATION_COMPLETE // ENCLAVE_UNLOCKED";
    if (navigator.vibrate) navigator.vibrate([10, 50, 100]);
    
    // THE SUCCESS FLASH
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,w,h);
}

function draw() {
    // Persistent faded state after success
    ctx.fillStyle = isVerified ? 'rgba(0,0,0,0.3)' : 'rgba(0,0,0,0.15)';
    ctx.fillRect(0, 0, w, h);
    
    ripples.forEach((p, i) => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        // Color shift based on verification
        ctx.strokeStyle = isVerified ? `rgba(0, 150, 255, ${p.a * 0.4})` : `rgba(255, 255, 255, ${p.a})`;
        ctx.lineWidth = isVerified ? 1 : 2;
        ctx.stroke();

        p.r += p.v;
        p.a -= isVerified ? 0.01 : 0.02; // Slower fade after success
        
        // THE BOOMERANG LOGIC: Bounce off edges
        if (p.r > w/2 || p.r > h/2) {
            p.v *= -0.8; // Reverse and dampen
        }

        if (p.a <= 0) ripples.splice(i, 1);
    });

    // REVEAL THE JITTER SHADOW (The Persistent Trace)
    if (isVerified) {
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        const step = w / historyZ.length;
        for(let i=0; i<historyZ.length; i++) {
            const x = i * step;
            const y = (h/2) + (historyZ[i] * 300);
            i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.stroke();
    }

    requestAnimationFrame(draw);
}
</script>
</body>
</html>
