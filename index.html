<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOGIFAB | KINETIC SECURE</title>
    <style>
        body { background:#0a0a0b; color:#0ff; font-family:'Courier New',monospace; margin:0; overflow:hidden; }
        #canvas { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:240px; height:240px; border-radius:50%; border:3px solid #0ff; box-shadow:0 0 30px #0ff; z-index:1; pointer-events:none; }
        #vid { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:240px; height:240px; object-fit:cover; border-radius:50%; z-index:2; }
        #ui { position:relative; z-index:10; padding:20px; height:100vh; display:flex; flex-direction:column; justify-content:space-between; }
        .glass { background:rgba(26,26,27,0.85); backdrop-filter:blur(12px); border:1px solid #0ff; border-radius:8px; padding:12px; margin-bottom:12px; box-shadow:0 0 20px rgba(0,242,255,0.2); }
        .ring { width:180px; height:180px; border-radius:50%; position:relative; margin:0 auto; border:6px solid #222; }
        #coherence-ring { position:absolute; top:0; left:0; width:100%; height:100%; border-radius:50%; background:conic-gradient(#0f0 0% var(--progress), #222 var(--progress) 100%); transition:background 0.2s; }
        button { background:#0ff; color:#000; border:none; padding:18px; font-weight:bold; width:100%; font-size:18px; margin-bottom:10px; border-radius:8px; }
        .debug { font-size:13px; color:#ff0; text-align:center; line-height:1.3; }
    </style>
</head>
<body>
<video id="vid" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="ui">
    <div class="glass" style="text-align:center;font-size:11px;letter-spacing:2px;">LOGIFAB • KINETIC SECURE</div>
    
    <div class="glass" style="flex:1;display:flex;align-items:center;justify-content:center;">
        <div class="ring">
            <div id="coherence-ring" style="--progress:0%;"></div>
            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:100%;">
                <div id="status" style="font-size:13px;color:#0ff;">1-SECOND MICRO-DRIFT</div>
            </div>
        </div>
    </div>

    <div class="glass">
        COHERENCE: <span id="score">0.00</span>
        <div style="height:8px;background:#222;border-radius:4px;overflow:hidden;margin-top:4px;">
            <div id="fill" style="height:100%;width:0%;background:#0ff;transition:width 0.1s;"></div>
        </div>
    </div>

    <div class="glass debug">
        ACCEL X: <span id="debug-x">0.00</span> FLOW: <span id="debug-flow">0</span>
    </div>

    <button id="start">START 1-SECOND HANDSHAKE</button>
</div>

<script>
const vid = document.getElementById('vid');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', {willReadFrequently:true});
const statusEl = document.getElementById('status');
const scoreEl = document.getElementById('score');
const fill = document.getElementById('fill');
const ring = document.getElementById('coherence-ring');
const samplesEl = document.getElementById('samples'); // not used but kept for future
const debugX = document.getElementById('debug-x');
const debugFlow = document.getElementById('debug-flow');

let recentX = [], flowVals = [];
const WINDOW = 35;
const THRESH = 0.45;

async function start() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
        vid.srcObject = stream;

        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            await DeviceMotionEvent.requestPermission();
        }

        window.addEventListener('devicemotion', onMotion);
        requestAnimationFrame(loop);

        document.getElementById('start').style.display = 'none';
        statusEl.textContent = 'NATURAL HOLD + SMALL LEFT/RIGHT SWAY';
    } catch(e) {
        statusEl.textContent = 'PERMISSION BLOCKED';
    }
}

function onMotion(e) {
    if (!e.acceleration) return;
    const val = Math.abs(e.acceleration.x || 0);
    recentX.push(val);
    if (recentX.length > WINDOW) recentX.shift();
    debugX.textContent = val.toFixed(3);
}

let prevPixels = null;
let sampleCount = 0;
function loop() {
    if (vid.readyState >= 2) {
        canvas.width = 240; canvas.height = 240;
        ctx.drawImage(vid, 0, 0, canvas.width, canvas.height);
        const frame = ctx.getImageData(0,0,canvas.width,canvas.height).data;

        if (prevPixels) {
            let flow = 0;
            for (let i = 0; i < frame.length; i += 16) {
                flow += Math.abs(frame[i] - prevPixels[i]);
            }
            flowVals.push(flow);
            if (flowVals.length > WINDOW) flowVals.shift();
            debugFlow.textContent = flow.toFixed(0);

            sampleCount++;
            if (recentX.length === WINDOW && flowVals.length === WINDOW && sampleCount > 12) {
                const avgX = recentX.reduce((a,b)=>a+b,0) / WINDOW;
                const avgFlow = flowVals.reduce((a,b)=>a+b,0) / WINDOW;
                const score = (avgX * 0.85 + (avgFlow / 2500) * 0.15);

                scoreEl.textContent = score.toFixed(2);
                fill.style.width = Math.min(100, score * 120) + '%';
                ring.style.setProperty('--progress', Math.min(100, score * 120) + '%');

                if (score > THRESH) {
                    statusEl.textContent = 'PHYSICS MATCH — LIVE HUMAN';
                    statusEl.style.color = '#0f0';
                } else {
                    statusEl.textContent = 'COHERENCE LOW — SMALL LEFT/RIGHT SWAY';
                    statusEl.style.color = '#f00';
                }
            }
        }
        prevPixels = frame.slice();
    }
    requestAnimationFrame(loop);
}

document.getElementById('start').addEventListener('click', start);
</script>
</body>
</html>
