<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOGIFAB | PHYSICS HANDSHAKE v1.9</title>
    <style>
        body { background:#000; color:#0ff; font-family:'Courier New',monospace; margin:0; overflow:hidden; }
        #canvas { position:absolute; top:0; left:0; pointer-events:none; opacity:0.4; }
        #ui { position:relative; z-index:10; padding:20px; }
        .box { border:1px solid #0ff; padding:12px; margin-bottom:12px; background:rgba(0,255,255,0.08); }
        .meter { height:12px; background:#222; border:1px solid #0ff; overflow:hidden; }
        #fill { height:100%; width:0%; background:#0ff; transition:width 0.1s; }
        button { background:#0ff; color:#000; border:none; padding:18px; font-weight:bold; width:100%; font-size:18px; margin-bottom:10px; }
        .warning { background:#f00; color:#000; padding:15px; text-align:center; display:none; margin-bottom:10px; }
        video { position:fixed; right:0; bottom:0; min-width:100%; min-height:100%; z-index:-1; opacity:0.25; filter:grayscale(1); }
        .debug { font-size:14px; color:#ff0; line-height:1.4; }
    </style>
</head>
<body>
<video id="vid" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="ui">
    <div class="box">STATUS: <span id="status">TAP BUTTON — MUST BE HTTPS</span></div>
    <div id="warning" class="warning">BLOCKED — Reset permissions</div>
    <div class="box">COHERENCE: <span id="score">0.00</span> 
        <div class="meter"><div id="fill"></div></div>
    </div>
    <div class="box">SAMPLES: <span id="samples">0</span>/50</div>
    <div class="debug">ACCEL X: <span id="debug-x">0.00</span><br>FLOW: <span id="debug-flow">0</span></div>
    <button id="start">REQUEST CAMERA + MOTION — START HANDSHAKE</button>
</div>

<script>
const vid = document.getElementById('vid');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', {willReadFrequently:true});
const statusEl = document.getElementById('status');
const scoreEl = document.getElementById('score');
const fill = document.getElementById('fill');
const samplesEl = document.getElementById('samples');
const warningEl = document.getElementById('warning');
const debugX = document.getElementById('debug-x');
const debugFlow = document.getElementById('debug-flow');

let recentX = [], flowVals = [];
const WINDOW = 40;
const THRESH = 0.42;

async function start() {
    warningEl.style.display = 'none';
    try {
        const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
        vid.srcObject = stream;

        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            await DeviceMotionEvent.requestPermission();
        }

        window.addEventListener('devicemotion', onMotion);
        requestAnimationFrame(loop);

        document.getElementById('start').style.display = 'none';
        statusEl.textContent = 'WARMING UP — NATURAL HOLD + SMALL LEFT/RIGHT DRIFT';
    } catch(e) {
        warningEl.style.display = 'block';
        statusEl.textContent = 'PERMISSION BLOCKED';
    }
}

function onMotion(e) {
    if (!e.acceleration) return;
    const val = Math.abs(e.acceleration.x || 0);
    recentX.push(val);
    if (recentX.length > WINDOW) recentX.shift();
    debugX.textContent = val.toFixed(3);
}

let prevPixels = null;
let sampleCount = 0;
function loop() {
    if (vid.readyState >= 2) {
        canvas.width = 120; canvas.height = 90;
        ctx.drawImage(vid, 0, 0, canvas.width, canvas.height);
        const frame = ctx.getImageData(0,0,canvas.width,canvas.height).data;

        if (prevPixels) {
            let flow = 0;
            for (let i = 0; i < frame.length; i += 16) {
                flow += Math.abs(frame[i] - prevPixels[i]);
            }
            flowVals.push(flow);
            if (flowVals.length > WINDOW) flowVals.shift();
            debugFlow.textContent = flow.toFixed(0);

            sampleCount++;
            samplesEl.textContent = Math.min(sampleCount, WINDOW) + '/50';

            if (recentX.length === WINDOW && flowVals.length === WINDOW && sampleCount > 15) {
                const avgX = recentX.reduce((a,b)=>a+b,0) / WINDOW;
                const avgFlow = flowVals.reduce((a,b)=>a+b,0) / WINDOW;
                const score = (avgX * 0.85 + (avgFlow / 2500) * 0.15);

                scoreEl.textContent = score.toFixed(2);
                fill.style.width = Math.min(100, score * 120) + '%';

                if (score > THRESH) {
                    statusEl.textContent = 'PHYSICS MATCH — LIVE HUMAN';
                    statusEl.style.color = '#0f0';
                } else {
                    statusEl.textContent = 'COHERENCE LOW — SMALL LEFT/RIGHT DRIFT';
                    statusEl.style.color = '#f00';
                }
            }
        }
        prevPixels = frame.slice();
    }
    requestAnimationFrame(loop);
}

document.getElementById('start').addEventListener('click', start);
</script>
</body>
</html>
