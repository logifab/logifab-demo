<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOGIFAB SENTINEL v8.6</title>
    <style>
        :root { --neon: #ffffff; --bg: #000000; --pass: #00ff66; --alert: #ff0033; }
        * { box-sizing: border-box; touch-action: none; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--neon); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        /* THE SINGULARITY */
        #singularity { position: fixed; top: 50%; left: 50%; width: 3px; height: 3px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px #fff; animation: breathe 3s infinite ease; z-index: 100; transition: opacity 0.5s ease; }
        
        #vault-chamber { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 1.5s ease; }
        
        #core-ring { 
            width: 80vw; height: 80vw; max-width: 400px; max-height: 400px; 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; 
            overflow: hidden; backdrop-filter: blur(80px); 
            transform: scale(0.6); opacity: 0; 
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        video#live-feed { width: 180%; height: 180%; object-fit: cover; filter: grayscale(1) contrast(1.8) brightness(0.5); mix-blend-mode: screen; position: relative; opacity: 0; transition: opacity 2s ease; }

        /* ENCLAVE DASHBOARD */
        #enclave { display: none; padding: 60px 40px; height: 100vh; flex-direction: column; background: #000; z-index: 200; position: fixed; top: 0; left: 0; width: 100%; }
        .telemetry { display: flex; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .label { font-size: 9px; opacity: 0.3; letter-spacing: 3px; text-transform: uppercase; }
        .val { font-family: monospace; font-size: 12px; letter-spacing: 1px; }
        
        canvas#jitter-graph { width: 100%; height: 200px; margin-top: auto; opacity: 0.8; }

        .wake-state { transform: scale(1) !important; opacity: 1 !important; backdrop-filter: blur(0px) !important; }
        .alert-state { border-color: var(--alert) !important; box-shadow: 0 0 60px var(--alert) !important; }
        @keyframes breathe { 0%, 100% { opacity: 0.2; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.8; transform: translate(-50%, -50%) scale(2.5); } }
    </style>
</head>
<body>

<div id="singularity"></div>
<div id="vault-chamber">
    <div id="core-ring"><video id="live-feed" autoplay playsinline muted></video></div>
</div>

<div id="enclave">
    <div class="telemetry">
        <div><div class="label">Status</div><div class="val">ATTESTED_LIVE</div></div>
        <div><div class="label">Sync_R</div><div id="dash-r" class="val">0.000</div></div>
    </div>
    <div class="telemetry">
        <div><div class="label">Entropy_Seed</div><div class="val">SHA-256_ACTIVE</div></div>
        <div><div class="label">Identity</div><div class="val" style="color:var(--pass)">BIOLOGICAL_CONFIRMED</div></div>
    </div>
    <div class="label" style="margin-top:20px;">Neural_Shadow_Diagnostic</div>
    <canvas id="jitter-graph"></canvas>
    <div class="label" style="margin-top:auto; text-align:center;">SENTINEL PROTOCOL V8.6 // ZERO_TRUST_HARDWARE</div>
</div>

<script>
const core = document.getElementById('core-ring'), live = document.getElementById('live-feed');
const singularity = document.getElementById('singularity'), chamber = document.getElementById('vault-chamber');
const enclave = document.getElementById('enclave'), dashR = document.getElementById('dash-r');
const jitterCanvas = document.getElementById('jitter-graph'), jCtx = jitterCanvas.getContext('2d');

let isAwake = false, historyX = [], historyF = [], jitterData = [], prevFrame = null;
const calcCanvas = document.createElement('canvas'); const calcCtx = calcCanvas.getContext('2d');
calcCanvas.width = calcCanvas.height = 64;

document.body.addEventListener('click', async () => {
    if (isAwake) return;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
        live.srcObject = stream;
        if(typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
        singularity.style.opacity = "0"; chamber.style.opacity = "1";
        
        window.addEventListener('devicemotion', (e) => {
            const x = e.accelerationIncludingGravity.x || 0;
            const z = e.accelerationIncludingGravity.z || 0;
            if (Math.abs(z) > 1.5 && !isAwake) { 
                isAwake = true; core.classList.add('wake-state'); live.style.opacity = "0.7"; 
            }
            if(isAwake) {
                historyX.push(x); if(historyX.length > 40) historyX.shift();
                jitterData.push(x); if(jitterData.length > 80) jitterData.shift();
                core.style.transform = `translate(${x * 3}px, 0) rotateY(${x * 4}deg)`;
            }
        });
        requestAnimationFrame(loop);
    } catch(e) { console.error("Hardware link failed."); }
});

function calculateCorrelation(a, b) {
    if(a.length < 10) return 0;
    const n = a.length, m1 = a.reduce((p,c)=>p+c,0)/n, m2 = b.reduce((p,c)=>p+c,0)/n;
    let num = 0, d1 = 0, d2 = 0;
    for(let i=0; i<n; i++){
        const v1 = a[i]-m1, v2 = b[i]-m2;
        num += v1*v2; d1 += v1*v1; d2 += v2*v2;
    }
    return Math.abs(num / Math.sqrt(d1 * d2 || 1));
}

function loop() {
    if (live.readyState >= 2 && isAwake) {
        calcCtx.drawImage(live, 0, 0, 64, 64);
        const frame = calcCtx.getImageData(0,0,64,64).data;
        if (prevFrame) {
            let flow = 0; for (let i = 0; i < frame.length; i += 16) flow += Math.abs(frame[i] - prevFrame[i]);
            historyF.push(flow); if(historyF.length > 40) historyF.shift();
            const r = calculateCorrelation(historyX, historyF);
            
            // ANTI-CHEAT: Stagnant physics check
            if (flow > 1500 && Math.abs(historyX[historyX.length-1]) < 0.01) {
                core.classList.add('alert-state'); return;
            }

            if (r > 0.90) triggerShatter(r);
        }
        prevFrame = frame.slice();
    }
    requestAnimationFrame(loop);
}

function triggerShatter(r) {
    core.style.transform = "scale(0)"; core.style.opacity = "0";
    if(navigator.vibrate) navigator.vibrate([10, 50, 200]);
    setTimeout(() => {
        chamber.style.display = "none";
        enclave.style.display = "flex";
        dashR.textContent = r.toFixed(4);
        renderJitter();
    }, 450);
}

function renderJitter() {
    jCtx.clearRect(0, 0, jitterCanvas.width, jitterCanvas.height);
    jCtx.beginPath(); jCtx.strokeStyle = "#00ff66"; jCtx.lineWidth = 1;
    const mean = jitterData.reduce((a, b) => a + b, 0) / jitterData.length;
    const sliceWidth = jitterCanvas.width / jitterData.length;
    for (let i = 0; i < jitterData.length; i++) {
        const jitter = jitterData[i] - mean;
        const x = i * sliceWidth;
        const y = (jitterCanvas.height / 2) + (jitter * 200);
        i === 0 ? jCtx.moveTo(x, y) : jCtx.lineTo(x, y);
    }
    jCtx.stroke();
    requestAnimationFrame(renderJitter);
}
</script>
</body>
</html>
