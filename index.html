<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOGIFAB | KINETIC VAULT v7.0</title>
    <style>
        :root { --neon: #ffffff; --bg: #000000; --blur: blur(15px); --pass: #00ff66; }
        * { box-sizing: border-box; touch-action: none; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* THE GLASS CHAMBER */
        #vault-chamber { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at 50% 50%, #111 0%, #000 80%); transition: opacity 0.5s ease; }

        /* THE PROGRESS RING */
        #sync-ring { position: absolute; width: 310px; height: 310px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.05); border-top: 2px solid var(--neon); transition: transform 0.1s linear, box-shadow 0.2s; opacity: 0.8; z-index: 5; }

        /* THE LIQUID CORE */
        #core-ring { width: 260px; height: 260px; border: 1px solid rgba(255,255,255,0.15); backdrop-filter: var(--blur); border-radius: 50%; box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(255,255,255,0.05); transition: transform 0.08s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s; display: flex; align-items: center; justify-content: center; overflow: hidden; z-index: 10; }
        
        /* THE VIDEO SLOSH */
        video#live-feed { width: 150%; height: 150%; object-fit: cover; filter: grayscale(1) contrast(1.4) brightness(0.7); mix-blend-mode: screen; transition: transform 0.08s linear; }

        /* THE SNAP STATE */
        .snapped { transform: rotateX(0deg) rotateY(0deg) scale(0.95) !important; border-color: var(--pass) !important; box-shadow: 0 0 80px rgba(0,255,102,0.3), inset 0 0 40px rgba(0,255,102,0.2) !important; }

        /* MINIMALIST DASHBOARD (POST-UNLOCK) */
        #dashboard { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 40px; flex-direction: column; justify-content: center; z-index: 50; background: #000; }
        .dash-title { font-size: 14px; opacity: 0.5; letter-spacing: 4px; margin-bottom: 20px; }
        .dash-stat { font-size: 48px; font-weight: 300; margin-bottom: 5px; }
        .dash-label { font-size: 10px; color: var(--pass); letter-spacing: 2px; margin-bottom: 30px; }

        /* HUD */
        #challenge-hud { position: absolute; top: 10%; width: 100%; text-align: center; z-index: 20; }
        .cmd-text { font-size: 18px; font-weight: 300; letter-spacing: 6px; }

        #ignite-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 80%; padding: 20px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.2); font-size: 14px; letter-spacing: 3px; cursor: pointer; backdrop-filter: blur(5px); z-index: 30; }
    </style>
</head>
<body>

<div id="vault-chamber">
    <div id="challenge-hud" style="display:none;">
        <div class="cmd-text" id="cmd-directive">AWAITING VECTOR</div>
    </div>
    
    <div id="sync-ring"></div>
    
    <div id="core-ring">
        <video id="live-feed" autoplay playsinline muted></video>
    </div>
</div>

<div id="dashboard">
    <div class="dash-title">LOGIFAB SECURE ENCLAVE</div>
    <div class="dash-stat" id="final-r">0.000</div>
    <div class="dash-label">PEARSON COHERENCE ATTESTED</div>
    <div class="dash-stat">12ms</div>
    <div class="dash-label">SENSOR-FLOW LATENCY</div>
    <div class="dash-stat" style="font-size: 24px;">HARDWARE</div>
    <div class="dash-label">ROOT OF TRUST VERIFIED</div>
</div>

<button id="ignite-btn">ENGAGE VAULT</button>

<script>
const vLive = document.getElementById('live-feed'), btn = document.getElementById('ignite-btn');
const coreRing = document.getElementById('core-ring'), syncRing = document.getElementById('sync-ring');
const cmdDirective = document.getElementById('cmd-directive'), hud = document.getElementById('challenge-hud');
const vaultChamber = document.getElementById('vault-chamber'), dashboard = document.getElementById('dashboard');
const finalR = document.getElementById('final-r');

const canvas = document.createElement('canvas'); canvas.width = 60; canvas.height = 60;
const ctx = canvas.getContext('2d', {willReadFrequently: true});

let historyX = [], historyF = [], prevFrame = null;
let challengeActive = false, requiredVector = 0;
let isUnlocked = false;
const WINDOW = 40;

function calculateCorrelation(arr1, arr2) {
    if(arr1.length === 0 || arr2.length === 0) return 0;
    const n = arr1.length;
    const mean1 = arr1.reduce((a,b)=>a+b,0)/n, mean2 = arr2.reduce((a,b)=>a+b,0)/n;
    let num = 0, den1 = 0, den2 = 0;
    for(let i=0; i<n; i++){
        const d1 = arr1[i]-mean1, d2 = arr2[i]-mean2;
        num += d1*d2; den1 += d1*d1; den2 += d2*d2;
    }
    const den = Math.sqrt(den1 * den2);
    return den === 0 ? 0 : num / den;
}

async function startVault() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
        vLive.srcObject = stream;
        if(typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
        
        window.addEventListener('devicemotion', (e) => {
            if(!challengeActive || isUnlocked) return;
            const x = e.accelerationIncludingGravity.x || 0;
            const y = e.accelerationIncludingGravity.y || 0;
            
            historyX.push(x); if(historyX.length > WINDOW) historyX.shift();
            
            // INERTIAL DRIFT PHYSICS
            const moveX = x * 6; const moveY = y * -6;
            vLive.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.4)`;
            
            // TACTILE VAULT ROTATION
            coreRing.style.transform = `rotateY(${x * 4}deg) rotateX(${y * -4}deg)`;
            syncRing.style.transform = `rotate(${x * 15}deg)`;
        });

        btn.style.display = 'none';
        issueChallenge();
        requestAnimationFrame(loop);
    } catch(e) { cmdDirective.textContent = "HARDWARE BLOCKED"; }
}

function issueChallenge() {
    historyX = []; historyF = [];
    const dir = Math.random() > 0.5 ? 1 : -1;
    requiredVector = dir * 3; 
    cmdDirective.textContent = dir > 0 ? "VECTOR: LEFT" : "VECTOR: RIGHT";
    hud.style.display = 'block';
    challengeActive = true;
}

function unlockSequence(correlation) {
    isUnlocked = true;
    challengeActive = false;
    
    // 1. THE MAGNETIC SNAP
    coreRing.classList.add('snapped');
    syncRing.style.borderColor = "var(--pass)";
    cmdDirective.textContent = "ATTESTED";
    
    // 2. HAPTIC CLICK (Safe Dial snapping open)
    if(navigator.vibrate) navigator.vibrate([50, 100, 50]);

    // 3. TRANSITION TO DASHBOARD
    setTimeout(() => {
        vaultChamber.style.opacity = '0';
        setTimeout(() => {
            vaultChamber.style.display = 'none';
            dashboard.style.display = 'flex';
            finalR.textContent = correlation.toFixed(4);
        }, 500);
    }, 1200);
}

function loop() {
    if (vLive.readyState >= 2 && challengeActive) {
        ctx.drawImage(vLive, 0, 0, 60, 60);
        const frame = ctx.getImageData(0,0,60,60).data;

        if (prevFrame) {
            let flowX = 0;
            for (let i = 0; i < frame.length; i += 16) flowX += (frame[i] - prevFrame[i]); 
            historyF.push(flowX); if(historyF.length > WINDOW) historyF.shift();

            if (historyX.length === WINDOW) {
                const currentR = Math.abs(calculateCorrelation(historyX, historyF));
                const currentX = historyX[historyX.length-1];
                
                // VECTOR INTENT LOGIC
                const intentMatch = (requiredVector > 0 && currentX > 2.5) || (requiredVector < 0 && currentX < -2.5);
                
                if (intentMatch && currentR > 0.85) {
                    unlockSequence(currentR);
                }
            }
        }
        prevFrame = frame.slice();
    }
    if(challengeActive) requestAnimationFrame(loop);
}

btn.addEventListener('click', startVault);
</script>
</body>
</html>
